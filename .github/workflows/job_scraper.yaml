name: Daily Job Scraper

on:
  schedule:
    # 4x daily at 13:00, 17:00, 21:00, 01:00 UTC
    # (≈ 6 AM / 10 AM / 2 PM / 6 PM US Pacific).
    - cron: "0 1,13,17,21 * * *"
  workflow_dispatch:

# The job commits the updated jobs_seen.json cache back to the repo.
permissions:
  contents: write

concurrency:
  group: job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
        run: python scraper.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain jobs_seen.json)" ]]; then
            git add jobs_seen.json
            git commit -m "chore: update jobs_seen cache [skip ci]"
            git push
          else
            echo "No cache changes to commit."
          fi
